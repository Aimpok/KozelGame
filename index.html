<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Игра Козел</title>
    
    <!-- Метатеги PWA для iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Козел">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        /* Сбрасываем все отступы браузера */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #E4E4E4; /* Единый фон на всю страницу */
            display: flex;
            justify-content: center; /* Привязка всего контента строго к центру */
            font-family: sans-serif;
            overflow-x: hidden; /* Скрываем горизонтальный скролл */
        }

        /* Центральная колонна, в которой лежат все элементы */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 450px;
            padding-bottom: 60px; /* Отступ в самом низу страницы */
        }

        /* Родительская группа для каждой плашки */
        .group {
            position: relative; /* Удерживает кнопку внутри своих границ */
            display: flex;
            justify-content: center;
        }

        /* Базовая картинка */
        .group img.base {
            display: block;
            pointer-events: none; /* Чтобы картинка плашки не выделялась и не мешала кликать */
        }

        /* Кликабельная кнопка поверх плашки */
        .btn-link {
            position: absolute;
            z-index: 10;
            display: block;
            transition: opacity 0.1s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; /* Убирает синий квадрат при клике на iOS */
        }

        /* Эффект при нажатии на кнопку */
        .btn-link:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ШАПКА -->
        <div class="group" style="margin-top: -17px; margin-bottom: 20px; transform: translateX(0px);">
            <img src="header.svg" class="base" alt="Шапка" style="width: 437px;">
        </div>

        <!-- ЗАГОЛОВОК -->
        <div class="group" style="margin-top: -52px; margin-bottom: 24px; transform: translateX(-10px);">
            <img src="title.svg" class="base" alt="Заголовок" style="width: 370px;">
        </div>

        <!-- КАРТОЧКА 1 -->
        <div class="group" style="margin-top: -35px; margin-bottom: -55px; transform: translateX(0px);">
            <img src="card1-text.svg" class="base" alt="Карточка 1" style="width: 430px;">
            
            <!-- КНОПКА 1 (Установка команды iCloud) -->
            <a href="https://www.icloud.com/shortcuts/942141b332544091a031b88b27360044" target="_blank" class="btn-link" style="left: 55px; top: 204px;">
                <img src="btn1.svg" alt="Установить команду" style="width: 320px; display: block;">
            </a>
        </div>

        <!-- КАРТОЧКА 2 -->
        <!-- Кнопка удалена, осталась только базовая плашка -->
        <div class="group" style="margin-top: 0px; margin-bottom: -55px; transform: translateX(0px);">
            <img src="card2-text.svg" class="base" alt="Карточка 2" style="width: 430px;">
        </div>

        <!-- КАРТОЧКА 3 (Кнопки нет, только плашка) -->
        <div class="group" style="margin-top: 0px; margin-bottom: 0px; transform: translateX(0px);">
            <img src="card3-text.svg" class="base" alt="Карточка 3" style="width: 430px;">
        </div>

    </div>

    <!-- Скрипт для работы логики PWA/Shortcuts -->
    <script>
        // Функция вызова меню "Поделиться" (оставил на всякий случай, если решишь вернуть кнопку)
        function openShareMenu() {
            if (navigator.share) {
                navigator.share({
                    title: 'Игра Козел',
                    url: window.location.href
                }).catch(err => console.log(err));
            } else {
                alert("Нажми на иконку квадрата со стрелкой (в самом низу экрана Safari), чтобы вручную добавить ярлык на экран Домой.");
            }
        }

        // Логика быстрого запуска, если открыли уже готовый ярлык с домашнего экрана
        if (window.navigator.standalone === true) {
            window.location.href = "shortcuts://run-shortcut?name=%D0%9A%D0%BE%D0%B7%D0%B5%D0%BB";
        }
    </script>
</body>
</html>
