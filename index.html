<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Установка приложения</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Мое Приложение">
    
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .container {
            max-width: 400px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            font-size: 16px;
            color: #aaaaaa;
            line-height: 1.5;
        }
        .instruction {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            border: 1px solid #333;
        }
        .arrow {
            font-size: 40px;
            margin-top: 20px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <div class="container" id="safari-view">
        <h1>Установка VPN / Читов</h1>
        <p>Чтобы установить это приложение на свой Айфон, выполни два простых шага:</p>
        
        <div class="instruction">
            <strong>1. Нажми кнопку «Поделиться»</strong> внизу экрана (квадрат со стрелкой вверх).<br><br>
            <strong>2. Выбери «На экран "Домой"»</strong> (или со значком плюс).
        </div>
        
        <div class="arrow">⬇️</div>
    </div>

    <script>
        // Твоя ссылка на быструю команду
        const shortcutUrl = "https://www.icloud.com/shortcuts/942141b332544091a031b88b27360044";

        // Проверяем, запущен ли сайт с главного экрана (как ярлык/Web Clip)
        if (window.navigator.standalone === true) {
            // Если запущен как ярлык, сразу перенаправляем на скачивание команды
            window.location.href = shortcutUrl;
        }
    </script>
</body>
</html>
