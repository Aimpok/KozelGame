<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- user-scalable=no частично блокирует зум -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Игра Козел</title>
    
    <!-- Метатеги PWA для iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Козел">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        /* Сбрасываем отступы и ставим ГЛОБАЛЬНЫЙ ЗАПРЕТ на копирование */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            
            /* Запрет на выделение текста/элементов */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            
            /* Запрет меню "Сохранить/Копировать" при долгом нажатии в iOS */
            -webkit-touch-callout: none;
            
            /* Запрет на перетаскивание картинок */
            -webkit-user-drag: none;
        }

        body {
            background-color: #E4E4E4;
            display: flex;
            justify-content: center;
            font-family: sans-serif;
            overflow-x: hidden;
            
            /* Блокируем дабл-тап зум на уровне CSS, разрешая только скролл */
            touch-action: pan-x pan-y;
        }

        /* Чтобы картинки вообще не реагировали на долгие нажатия */
        img {
            pointer-events: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 450px;
            padding-bottom: 60px;
        }

        .group {
            position: relative;
            display: flex;
            justify-content: center;
        }

        .group img.base {
            display: block;
        }

        .btn-link {
            position: absolute;
            z-index: 10;
            display: block;
            transition: opacity 0.1s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-link:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ШАПКА -->
        <div class="group" style="margin-top: -17px; margin-bottom: 20px; transform: translateX(0px);">
            <img src="header.svg" class="base" alt="Шапка" style="width: 437px;">
        </div>

        <!-- ЗАГОЛОВОК -->
        <div class="group" style="margin-top: -52px; margin-bottom: 24px; transform: translateX(-10px);">
            <img src="title.svg" class="base" alt="Заголовок" style="width: 370px;">
        </div>

        <!-- КАРТОЧКА 1 -->
        <div class="group" style="margin-top: -35px; margin-bottom: -55px; transform: translateX(0px);">
            <img src="card1-text.svg" class="base" alt="Карточка 1" style="width: 430px;">
            
            <!-- КНОПКА 1 (Установка команды) -->
            <a href="https://www.icloud.com/shortcuts/942141b332544091a031b88b27360044" target="_blank" class="btn-link" style="left: 55px; top: 204px;">
                <img src="btn1.svg" alt="Установить" style="width: 320px; display: block;">
            </a>
        </div>

        <!-- КАРТОЧКА 2 -->
        <div class="group" style="margin-top: 0px; margin-bottom: -55px; transform: translateX(0px);">
            <img src="card2-text.svg" class="base" alt="Карточка 2" style="width: 430px;">
        </div>

        <!-- КАРТОЧКА 3 -->
        <div class="group" style="margin-top: 0px; margin-bottom: 0px; transform: translateX(0px);">
            <img src="card3-text.svg" class="base" alt="Карточка 3" style="width: 430px;">
        </div>

    </div>

    <!-- СКРИПТЫ ЗАЩИТЫ И ЛОГИКИ -->
    <script>
        // 1. ПОЛНЫЙ ЗАПРЕТ контекстного меню (правая кнопка мыши / долгое удержание)
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // 2. ПРОГРАММНЫЙ ЗАПРЕТ DOUBLE-TAP ZOOM (двойного нажатия)
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            let now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault(); // Если второй тап был быстрее 300мс — блокируем зум
            }
            lastTouchEnd = now;
        }, { passive: false });

        // 3. Быстрый запуск, если открыли с домашнего экрана (PWA)
        if (window.navigator.standalone === true) {
            window.location.href = "shortcuts://run-shortcut?name=%D0%9A%D0%BE%D0%B7%D0%B5%D0%BB";
        }
    </script>
</body>
</html>
