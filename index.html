<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Запуск игры</title>
    
    <!-- Настройки для iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Игра Козел">
    
    <!-- Ссылка на иконку (если файл icon.png есть в репозитории) -->
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            background: #1c1c1e;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #333;
            max-width: 320px;
        }
        h1 { margin-top: 0; font-size: 22px; }
        p { font-size: 16px; color: #d1d1d6; line-height: 1.4; }
        .arrow { font-size: 50px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Запуск игры</h1>
        <p>Чтобы запустить игру, добавь её на главный экран:</p>
        <p>1. Нажми «Поделиться» (внизу).</p>
        <p>2. Выбери «На экран "Домой"».</p>
        <div class="arrow">⬇️</div>
    </div>

    <script>
        // Проверяем, запущен ли сайт как Web Clip (ярлык)
        if (window.navigator.standalone === true) {
            // Мгновенный запуск команды "Козел"
            window.location.href = "shortcuts://run-shortcut?name=Козел";
        }
    </script>
</body>
</html>
